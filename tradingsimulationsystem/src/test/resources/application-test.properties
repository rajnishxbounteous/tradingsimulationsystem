# Use H2 in-memory DB for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Dummy Finnhub values (so placeholders resolve, but no real calls)
finnhub.api.key=dummy-test-key
finnhub.base.url=https://finnhub.io

# Dummy JWT values (so JwtUtil bean can be created)
# --- JWT Config ---
# Access token: short-lived (e.g. 15 minutes)
jwt.access.secret=TESTSECRETKEYMoMOMoidmoiOoiIUMmlkMOKmomOIJWIJ93394039MDSDNE34NJFNERIJ
jwt.access.expiration=900000

# Refresh token: long-lived (e.g. 7 days)
jwt.refresh.secret=TESTREFRESHKEY10987654321MNBVCXZLKJHGFDSAQWERTYUIOP0987654321ZXCVBNM
jwt.refresh.expiration=604800000


# Disable seeding in tests
app.seed-stocks=false
