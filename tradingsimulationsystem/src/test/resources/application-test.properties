# Use H2 in-memory DB for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Dummy Finnhub values (so placeholders resolve, but no real calls)
finnhub.api.key=dummy-test-key
finnhub.base.url=https://finnhub.io

# Dummy JWT values (so JwtUtil bean can be created)
jwt.secret=iojiodmwmemwJJIDEMmsimIMNimINMinININ32I43N2434893492JDEJNCIWJDNWMNNSIIOAOAOM
jwt.expiration=3600000

# Disable seeding in tests
app.seed-stocks=false
